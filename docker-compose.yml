services:
  app:
    build: .
    container_name: deployanyfile
    ports:
      - "8080:8080"
    environment:
      # Change these before exposing the service publicly!
      JWT_SECRET: "please-change-this-to-a-long-random-string"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "admin123"
      MAX_UPLOAD_MB: "100"
    volumes:
      - app-data:/app/data
    restart: unless-stopped

volumes:
  app-data:
